name: shadermind
services:
  - name: web
    github:
      repo: jin-dalrae/shadermind
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DIGITAL_OCEAN_MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_INFERENCE_ROUTER
        value: ""
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ALLOW_GEMINI_FALLBACK
        value: "true"
      - key: MONGODB_DB
        value: shadermind
      - key: LEARNING_MODE
        value: human
      - key: AUTOPILOT
        value: "true"
      - key: AUTOPILOT_INTERVAL_MS
        value: "0"
      - key: GENERATION_MODE
        value: fast
      - key: EVOLUTION_ASYNC
        value: "true"
      - key: CONSOLIDATION_EVERY_N
        value: "25"
      - key: BATCH_SIZE
        value: "3"
      - key: CODE_AWARE_LEARNING
        value: "true"
      - key: PORT
        value: "8080"
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    run_command: node server.js